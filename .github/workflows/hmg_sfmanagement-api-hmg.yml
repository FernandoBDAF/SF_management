# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - sfmanagement-api-hmg

on:
  push:
    branches:
      - hmg
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: "9.x"
          include-prerelease: true

      - name: Install dotnet-ef tool
        run: dotnet tool install --global dotnet-ef --version 9.*

      - name: Restore dependencies
        run: dotnet restore SFManagement.csproj

      - name: Check vulnerable packages
        run: dotnet list SFManagement.csproj package --vulnerable --include-transitive > vulnerability-report.txt
        continue-on-error: true

      - name: Generate idempotent migration script
        run: dotnet ef migrations script --project SFManagement.csproj --idempotent --output migration.sql

      - name: Build with dotnet
        run: dotnet build SFManagement.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish SFManagement.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp
          retention-days: 1 # Only keep artifacts for 1 day

      - name: Upload migration artifact
        uses: actions/upload-artifact@v4
        with:
          name: migration-script
          path: migration.sql
          retention-days: 7

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: vulnerability-report.txt
          retention-days: 7

  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: "production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app


      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_671235205EF746FD97AFED31E95B213D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C95B46F38D89451F9A27AD4D51AF1864 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0DCDE389B9E0471898DDAC6B6169C2F9 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: "sfmanagement-api-hmg"
          slot-name: "Production"
          package: .
