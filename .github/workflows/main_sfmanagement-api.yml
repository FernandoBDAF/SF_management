# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - sfmanagement-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"

      - name: Restore dependencies
        run: dotnet restore SFManagement.csproj

      - name: Check vulnerable packages
        run: dotnet list SFManagement.csproj package --vulnerable --include-transitive > vulnerability-report.txt
        continue-on-error: true

      - name: Generate idempotent migration script
        run: |
          dotnet new tool-manifest --force
          dotnet tool install dotnet-ef --version 9.*
          dotnet ef migrations script --project SFManagement.csproj --idempotent --output migration.sql
        continue-on-error: true

      - name: Build with dotnet
        run: dotnet build SFManagement.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish SFManagement.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

      - name: Upload migration artifact
        uses: actions/upload-artifact@v4
        with:
          name: migration-script
          path: migration.sql

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: vulnerability-report.txt

  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EE8FB9C4DA834556A447BE046993CFB2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1EC8853231644217A47C645F847F80C5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F6E4A6A6A1474CD4A3F887F9CCB51074 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "sfmanagement-api"
          slot-name: "Production"
          package: .
